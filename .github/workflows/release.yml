name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: tonhe
          repositories: homebrew-tap

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tonhe/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - name: Update flo formula
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(curl -sL "https://github.com/tonhe/flo/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" | shasum -a 256 | cut -d' ' -f1)

          cat > Formula/flo.rb << 'FORMULA'
          class Flo < Formula
            desc "TUI SNMP interface monitor with identity management and dashboard engines"
            homepage "https://github.com/tonhe/flo"
            url "https://github.com/tonhe/flo/archive/refs/tags/vVERSION_PLACEHOLDER.tar.gz"
            sha256 "SHA256_PLACEHOLDER"
            license "MIT"

            depends_on "go" => :build

            def install
              ldflags = %W[
                -s -w
                -X github.com/tonhe/flo/internal/version.Version=#{version}
                -X github.com/tonhe/flo/internal/version.Build=#{tap.user}
              ]
              system "go", "build", *std_go_args(ldflags:)
            end

            test do
              assert_match "flo v#{version}", shell_output("#{bin}/flo --version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/flo.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/g" Formula/flo.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/flo.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/flo.rb
          git commit -m "flo: update to ${VERSION}"
          git push
